name: Deploy user site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: user-site
  cancel-in-progress: true

env:
  TARGET_REPOSITORY: JByteH/JByteH.github.io

jobs:
  deploy:
    name: Publish to GitHub Pages user site
    runs-on: ubuntu-latest

    steps:
      - name: Check out privacy policy
        uses: actions/checkout@v4
        with:
          path: source

      - name: Check out user site repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          token: ${{ secrets.USER_SITE_DEPLOY_TOKEN }}
          path: site

      - name: Prepare user site content
        run: |
          set -euo pipefail

          find site -mindepth 1 -maxdepth 1 ! -name .git ! -name .github ! -name CNAME -exec rm -rf {} +
          cp source/README.md site/index.md
          cp source/app-ads.txt site/app-ads.txt

      - name: Commit and push
        working-directory: site
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all

          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy privacy policy"
            git push origin main
          fi
